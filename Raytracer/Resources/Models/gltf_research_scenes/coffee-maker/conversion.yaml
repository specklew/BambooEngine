scene:
  id: "coffee-maker"
  format: "pbrt-v4"
  source: "scenes/coffee-maker/source/scene-v4.pbrt"
  license: "see source license file"
  license_file: "scenes/coffee-maker/source/LICENSE.txt"
outputs:
  core: "scenes/coffee-maker/gltf/coffee_maker_core.gltf"
  extended: "scenes/coffee-maker/gltf/coffee_maker_extended.gltf"
  extended_extensions: ["KHR_materials_specular", "KHR_materials_clearcoat", "KHR_materials_transmission", "KHR_materials_ior", "KHR_materials_emissive_strength"]
summary:
  meshes: 23
  triangles: 235271
  materials: 6
  textures: 0
  lights: 3
render:
  integrator: "path"
  max_depth: 17
  sampler: "sobol"
  samples_per_pixel: 64
  pixel_filter: "triangle"
  resolution: [800, 1000]
  fov_degrees: 25.0
conversion:
  double_sided: true
  defaults:
    metallic: 0.0
    roughness: 1.0
    extended_specular_factor: 0.0
    dielectric_transmission_factor: 1.0
    dielectric_roughness: 0.0
  coateddiffuse_clearcoat_factor: 1.0
material_mappings:
  -
    pbrt: "diffuse"
    gltf: "baseColorFactor"
    count: 1
  -
    name: "Plastic_Orange"
    pbrt: "coateddiffuse"
    gltf: "baseColorFactor + KHR_materials_clearcoat"
    clearcoat_factor: 1.0
    clearcoat_roughness: 0.001
    pbrt_roughness: [0.001, 0.001]
    pbrt_remaproughness: false
  -
    name: "Plastic_Black"
    pbrt: "coateddiffuse"
    gltf: "baseColorFactor + KHR_materials_clearcoat"
    clearcoat_factor: 1.0
    clearcoat_roughness: 0.1
    pbrt_roughness: [0.1, 0.1]
    pbrt_remaproughness: false
  -
    name: "Glass"
    pbrt: "dielectric"
    gltf: "alpha blend fallback + KHR_materials_transmission + KHR_materials_ior"
    eta: 1.5
    pbrt_remaproughness: false
  -
    name: "Metal"
    pbrt: "conductor"
    gltf: "metallicFactor + baseColorFactor from eta and k"
    eta: [0.155, 0.116, 0.138]
    k: [4.828, 3.122, 2.146]
    named_spectra:
      eta: "metal-Ag-eta"
      k: "metal-Ag-k"
    base_color: [0.974841, 0.957789, 0.906446]
    roughness: 0.0
  -
    name: "Floor"
    pbrt: "coateddiffuse"
    gltf: "baseColorFactor + KHR_materials_clearcoat"
    clearcoat_factor: 1.0
    clearcoat_roughness: 0.001
    pbrt_roughness: [0.001, 0.001]
    pbrt_remaproughness: false
light_mappings:
  -
    pbrt: "diffuse area light"
    mesh: "20_diffuse_00"
    gltf: "emissive mesh + KHR_materials_emissive_strength"
    radiance_rgb: [2.0, 2.0, 2.0]
    twosided: false
  -
    pbrt: "diffuse area light"
    mesh: "21_diffuse_00"
    gltf: "emissive mesh + KHR_materials_emissive_strength"
    radiance_rgb: [2.0, 2.0, 2.0]
    twosided: false
  -
    pbrt: "diffuse area light"
    mesh: "22_diffuse_00"
    gltf: "emissive mesh + KHR_materials_emissive_strength"
    radiance_rgb: [2.0, 2.0, 2.0]
    twosided: false
approximations: ["area_light_emissive_mesh", "coateddiffuse_clearcoat", "dielectric_transmission_ior", "conductor_metallic"]
losses: ["render_integrator", "render_sampler", "pixel_filter", "film_output"]
