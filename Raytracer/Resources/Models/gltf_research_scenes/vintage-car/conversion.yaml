    k: [5.206434, 4.231365, 3.754947]
    base_color: [0.687548, 0.649066, 0.687011]
    roughness: 0.01
    pbrt_roughness: [0.01, 0.01]
    pbrt_remaproughness: false
  -
    name: "WhiteRubber"
    pbrt: "coateddiffuse"
    gltf: "baseColorFactor + KHR_materials_clearcoat"
    clearcoat_factor: 1.0
    clearcoat_roughness: 0.4
    pbrt_roughness: [0.4, 0.4]
    pbrt_remaproughness: false
  -
    name: "DarkRubber"
    pbrt: "coateddiffuse"
    gltf: "baseColorFactor + KHR_materials_clearcoat"
    clearcoat_factor: 1.0
    clearcoat_roughness: 0.4
    pbrt_roughness: [0.4, 0.4]
    pbrt_remaproughness: false
  -
    name: "WindowGlass"
    pbrt: "dielectric"
    gltf: "alpha blend fallback + KHR_materials_transmission + KHR_materials_ior"
    eta: 1.5
  -
    name: "RoughSteel"
    pbrt: "conductor"
    gltf: "metallicFactor + baseColorFactor from eta and k"
    eta: [4.369683, 2.916703, 1.654701]
    k: [5.206434, 4.231365, 3.754947]
    base_color: [0.687548, 0.649066, 0.687011]
    roughness: 0.1
    pbrt_roughness: [0.1, 0.1]
    pbrt_remaproughness: false
light_mappings:
